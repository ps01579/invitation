<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>산수연 초대장</title>
  <meta name="description" content="감사한 분들을 모시고 산수연 자리에 초대합니다." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="산수연 초대장" />
  <meta property="og:description" content="감사한 분들을 모시고 산수연 자리에 초대합니다." />
  <meta property="og:image" content="./assets/og-image.png" />
  <meta name="theme-color" content="#8c6a4f" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="background-decoration background-decoration-1"></div>
  <div class="background-decoration background-decoration-2"></div>

  <header class="hero section">
    <div class="hero-card container">
      <p class="eyebrow" id="heroLabel">SAN SU YEON</p>
      <h1 id="mainTitle">박종배님<br />산수연에 초대합니다</h1>
      <p class="hero-subtitle" id="heroSubtitle">귀한 걸음으로 함께해 주시면 더없는 기쁨이겠습니다.</p>
      <div class="hero-date-box">
        <p id="heroDate">2026년 4월 25일 토요일 오후 6시</p>
        <p id="heroVenue"></p>
      </div>
      <a class="primary-button" href="#location">오시는 길 보기</a>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container intro-card">
        <p class="section-label">INVITATION</p>
        <h2 class="section-title">초대의 말씀</h2>
        <p class="message" id="invitationMessage"></p>
        <div class="host-box">
          <p id="hostLine">박남매 올림</p>
        </div>
      </div>
    </section>

    <section class="section info-section">
      <div class="container">
        <p class="section-label">EVENT INFO</p>
        <h2 class="section-title">행사 안내</h2>
        <div class="info-grid">
          <article class="info-item">
            <h3>일시</h3>
            <p id="eventDateText"></p>
          </article>
          <article class="info-item">
            <h3>장소</h3>
            <p id="venueName"></p>
          </article>
          <article class="info-item">
            <h3>주소</h3>
            <p id="venueAddress"></p>
          </article>
          <article class="info-item">
            <h3>연락처</h3>
            <p id="contactText"></p>
          </article>
        </div>
      </div>
    </section>

    <section class="section gallery-section">
      <div class="container">
        <p class="section-label">GALLERY</p>
        <h2 class="section-title">소중한 순간들</h2>
        <div class="gallery" id="gallery"></div>
      </div>
    </section>

    <section class="section location-section" id="location">
      <div class="container">
        <p class="section-label">LOCATION</p>
        <h2 class="section-title">오시는 길</h2>

        <div class="location-card">
          <div class="map-placeholder">
            <p class="map-title" id="mapVenueName"></p>
            <p id="mapVenueAddress"></p>
            <div class="map-actions">
              <a id="naverMapLink" class="secondary-button" href="#" target="_blank" rel="noopener">네이버지도</a>
              <a id="kakaoMapLink" class="secondary-button" href="#" target="_blank" rel="noopener">카카오맵</a>
              <button class="secondary-button" id="copyAddressButton" type="button">주소 복사</button>
            </div>
          </div>
          <div class="traffic-box">
            <h3>교통 안내</h3>
            <ul id="trafficList"></ul>
          </div>
        </div>
      </div>
    </section>

    <section class="section account-section" style="display: none">
      <div class="container">
        <p class="section-label">CONTACT</p>
        <h2 class="section-title">마음 전하실 곳</h2>
        <p class="account-notice">참석이 어려우신 분들을 위해 계좌 정보를 함께 남깁니다.</p>
        <div class="account-list" id="accountList"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p id="footerText">귀한 걸음에 깊이 감사드립니다.</p>
    </div>
  </footer>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="./site-data.js?ver=005"></script>
  <script src="./script.js?ver=001"></script>
</body>
</html>
